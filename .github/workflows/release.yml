name: Release
on:
  push:
    branches: [release]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP 'const VERSION = "\K[^"]+' src/update.ts)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  build:
    needs: prepare
    if: needs.prepare.outputs.exists == 'false'
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: openui-mcp-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            artifact: openui-mcp-linux-arm64
            os: ubuntu-latest
          - target: bun-darwin-arm64
            artifact: openui-mcp-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            artifact: openui-mcp-darwin-x64
            os: macos-latest
          - target: bun-windows-x64
            artifact: openui-mcp-win-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install previewer dependencies
        run: cd previewer && bun install

      - name: Build previewer
        run: cd previewer && bun run build

      - name: Embed assets
        run: bun scripts/embed-assets.ts

      - name: Compile binary
        run: bun build --compile src/server.ts --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv ${{ matrix.artifact }} openui-mcp

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: ren ${{ matrix.artifact }}.exe openui-mcp.exe

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}.tar.gz openui-mcp

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path openui-mcp.exe -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
