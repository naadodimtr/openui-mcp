name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: openui-mcp-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            artifact: openui-mcp-linux-arm64
            os: ubuntu-latest
          - target: bun-darwin-arm64
            artifact: openui-mcp-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            artifact: openui-mcp-darwin-x64
            os: macos-latest
          - target: bun-windows-x64
            artifact: openui-mcp-win-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install previewer dependencies
        run: cd previewer && bun install

      - name: Build previewer
        run: cd previewer && bun run build

      - name: Embed assets
        run: bun scripts/embed-assets.ts

      - name: Compile binary
        run: bun build --compile src/server.ts --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "${{ matrix.artifact }}.exe" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
