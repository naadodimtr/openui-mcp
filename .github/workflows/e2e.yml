name: E2E
on:
  workflow_call: {}
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install previewer dependencies
        run: cd previewer && bun install

      - name: Build previewer
        run: cd previewer && bun run build

      - name: Embed assets
        run: bun scripts/embed-assets.ts

      - name: Install Playwright
        run: bunx playwright install chromium

      - name: Run E2E tests (default library)
        run: bunx playwright test tests/e2e/e2e.pw.ts tests/e2e/error-boundary.pw.ts tests/e2e/library-switch.pw.ts

  e2e-kumo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install previewer dependencies
        run: cd previewer && bun install

      - name: Build previewer
        run: cd previewer && bun run build

      - name: Embed assets
        run: bun scripts/embed-assets.ts

      - name: Build Kumo adapter
        run: bun adapters/kumo/build.ts

      - name: Install Kumo library
        run: bun src/server.ts install-library ./adapters/kumo/dist/

      - name: Install Playwright
        run: bunx playwright install chromium

      - name: Run Kumo E2E tests
        run: bunx playwright test tests/e2e/kumo.pw.ts tests/e2e/kumo-components.pw.ts
