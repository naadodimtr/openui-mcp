name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install root dependencies
        run: bun install

      - name: Install previewer dependencies
        run: cd previewer && bun install

      - name: Build previewer
        run: cd previewer && bun run build

      - name: Run unit tests
        run: bun test

      - name: Install Playwright
        run: bunx playwright install chromium

      - name: Embed assets
        run: bun scripts/embed-assets.ts

      - name: Run E2E tests
        run: bunx playwright test

      - name: Verify build compiles
        run: bun build --compile src/server.ts --outfile dist/openui-mcp
