id: kumo
name: Cloudflare Kumo
version: 0.1.0
upstream: "@cloudflare/kumo@^2.0.0"
description: "Cloudflare's design system — semantic tokens, Tailwind v4, accessible components"

styles:
  entry: styles.css
  framework: tailwind-v4

root: Stack

componentGroups:
  - name: Layout
    components: [Stack, Card, Tabs, TabItem, Separator]
    notes:
      - "Use Stack for flex layouts with semantic gap tokens"
      - "Cards use surface hierarchy: base → elevated → recessed"
  - name: Content
    components: [Text, Heading, Badge, Callout, CodeBlock]
    notes:
      - "Text uses semantic color tokens (text-kumo-default, text-kumo-subtle)"
  - name: Data
    components: [Table, TableColumn]
  - name: Forms
    components: [Button, Input, Select, SelectItem, Checkbox, Switch]

components:
  - name: Stack
    import: "{ Stack } from @cloudflare/kumo"
    description: "Flex container with semantic gap and direction"
    props:
      - name: children
        type: any[]
        required: true
        position: 0
      - name: direction
        type: enum [row, column]
        position: 1
      - name: gap
        type: enum [none, xs, sm, md, lg, xl]
        position: 2
      - name: align
        type: enum [start, center, end, stretch, baseline]
        position: 3
      - name: justify
        type: enum [start, center, end, between, around, evenly]
        position: 4

  - name: Card
    import: "{ Card } from @cloudflare/kumo"
    description: "Elevated container with border and padding using surface hierarchy"
    props:
      - name: children
        type: any[]
        required: true
        position: 0
      - name: variant
        type: enum [elevated, outlined, ghost]
        position: 1

  - name: Text
    import: "{ Text } from @cloudflare/kumo"
    description: "Text block with semantic sizing and color"
    props:
      - name: children
        type: string
        required: true
        position: 0
      - name: size
        type: enum [xs, sm, md, lg, xl, 2xl]
        position: 1
      - name: weight
        type: enum [normal, medium, semibold, bold]
        position: 2
      - name: color
        type: enum [default, subtle, muted, accent, success, warning, danger]
        position: 3

  - name: Heading
    import: "{ Heading } from @cloudflare/kumo"
    description: "Section heading with level and optional subtitle"
    props:
      - name: children
        type: string
        required: true
        position: 0
      - name: level
        type: enum [1, 2, 3, 4, 5, 6]
        position: 1
      - name: subtitle
        type: string
        position: 2

  - name: Button
    import: "{ Button } from @cloudflare/kumo"
    description: "Interactive button with variants and sizes"
    props:
      - name: children
        type: string
        required: true
        position: 0
      - name: variant
        type: enum [primary, secondary, ghost, destructive]
        position: 1
      - name: size
        type: enum [sm, md, lg]
        position: 2

  - name: Badge
    import: "{ Badge } from @cloudflare/kumo"
    description: "Small label for status or categorization"
    props:
      - name: children
        type: string
        required: true
        position: 0
      - name: variant
        type: enum [neutral, info, success, warning, danger]
        position: 1
      - name: size
        type: enum [sm, md]
        position: 2

  - name: Callout
    import: "{ Callout } from @cloudflare/kumo"
    description: "Alert banner for important information"
    props:
      - name: variant
        type: enum [info, success, warning, danger]
        required: true
        position: 0
      - name: title
        type: string
        required: true
        position: 1
      - name: description
        type: string
        position: 2

  - name: CodeBlock
    import: "{ CodeBlock } from @cloudflare/kumo"
    description: "Syntax-highlighted code display"
    props:
      - name: language
        type: string
        required: true
        position: 0
      - name: code
        type: string
        required: true
        position: 1

  - name: Table
    import: "{ Table } from @cloudflare/kumo"
    description: "Data table with column definitions"
    props:
      - name: columns
        type: component[]
        required: true
        position: 0

  - name: TableColumn
    import: "{ TableColumn } from @cloudflare/kumo"
    description: "Column definition for Table"
    props:
      - name: label
        type: string
        required: true
        position: 0
      - name: data
        type: any
        required: true
        position: 1
      - name: type
        type: enum [string, number, action]
        position: 2

  - name: Input
    import: "{ Input } from @cloudflare/kumo"
    description: "Text input field"
    props:
      - name: name
        type: string
        required: true
        position: 0
      - name: placeholder
        type: string
        position: 1
      - name: type
        type: enum [text, email, password, number, url]
        position: 2

  - name: Select
    import: "{ Select } from @cloudflare/kumo"
    description: "Dropdown select input"
    props:
      - name: name
        type: string
        required: true
        position: 0
      - name: items
        type: component[]
        required: true
        position: 1
      - name: placeholder
        type: string
        position: 2

  - name: SelectItem
    import: "{ SelectItem } from @cloudflare/kumo"
    description: "Option for Select"
    props:
      - name: value
        type: string
        required: true
        position: 0
      - name: label
        type: string
        required: true
        position: 1

  - name: Tabs
    import: "{ Tabs } from @cloudflare/kumo"
    description: "Tabbed container for switching views"
    props:
      - name: items
        type: component[]
        required: true
        position: 0

  - name: TabItem
    import: "{ TabItem } from @cloudflare/kumo"
    description: "Tab panel within Tabs"
    props:
      - name: value
        type: string
        required: true
        position: 0
      - name: label
        type: string
        required: true
        position: 1
      - name: content
        type: any[]
        required: true
        position: 2

  - name: Separator
    import: "{ Separator } from @cloudflare/kumo"
    description: "Visual divider between content sections"
    props:
      - name: orientation
        type: enum [horizontal, vertical]
        position: 0

  - name: Checkbox
    import: "{ Checkbox } from @cloudflare/kumo"
    description: "Checkbox toggle"
    props:
      - name: name
        type: string
        required: true
        position: 0
      - name: label
        type: string
        required: true
        position: 1
      - name: defaultChecked
        type: boolean
        position: 2

  - name: Switch
    import: "{ Switch } from @cloudflare/kumo"
    description: "Toggle switch"
    props:
      - name: name
        type: string
        required: true
        position: 0
      - name: label
        type: string
        required: true
        position: 1
      - name: defaultChecked
        type: boolean
        position: 2
